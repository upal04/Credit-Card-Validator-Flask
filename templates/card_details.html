{% extends "base.html" %}
{% block title %}Card Details{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1><i class="fas fa-credit-card"></i> Card Details</h1>
        <!-- Visual card -->
        <div style="background:linear-gradient(135deg,#0d1117,#1a1f2e);border:1px solid rgba(99,210,255,0.2);border-radius:16px;padding:28px;margin-bottom:24px;font-family:var(--font-mono);position:relative;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.5);">
            <div style="position:absolute;top:-60px;right:-60px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(99,210,255,0.07),transparent 70%);"></div>
            <div style="position:absolute;bottom:-40px;left:-40px;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,rgba(167,139,250,0.06),transparent 70%);"></div>
            <div style="width:38px;height:26px;background:linear-gradient(135deg,#c9a227,#f5d062,#c9a227);border-radius:4px;margin-bottom:20px;position:relative;z-index:1;"></div>
            <div style="font-size:1.2rem;letter-spacing:0.22em;color:var(--text);margin-bottom:20px;position:relative;z-index:1;">{{ format_number(card.number) }}</div>
            <div style="display:flex;justify-content:space-between;align-items:flex-end;position:relative;z-index:1;">
                <div>
                    <div style="font-size:0.6rem;letter-spacing:0.12em;color:var(--text-muted);text-transform:uppercase;margin-bottom:3px;">Card Holder</div>
                    <div style="color:var(--text);font-size:0.88rem;">{{ card.holder }}</div>
                </div>
                <div>
                    <div style="font-size:0.6rem;letter-spacing:0.12em;color:var(--text-muted);text-transform:uppercase;margin-bottom:3px;">Expires</div>
                    <div style="color:var(--text);font-size:0.88rem;">{{ card.expiry }}</div>
                </div>
                <div>
                    <div style="font-size:0.6rem;letter-spacing:0.12em;color:var(--text-muted);text-transform:uppercase;margin-bottom:3px;">CVV</div>
                    <div style="color:var(--text);font-size:0.88rem;">{{ card.cvv }}</div>
                </div>
            </div>
        </div>
        <a href="{{ url_for('view_cards') }}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back to Cards</a>
    </div>
</div>
{% endblock %}
