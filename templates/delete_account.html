{% extends "base.html" %}
{% block title %}Delete Account{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1><i class="fas fa-exclamation-triangle" style="color:var(--red);"></i> Delete Account</h1>
        <div class="alert alert-danger">
            <strong>Irreversible action.</strong> All your saved cards will be permanently deleted along with your account.
        </div>
        <form method="POST" class="p-4 rounded">
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="confirm" name="confirm" required>
                <label class="form-check-label" for="confirm" style="text-transform:none;font-size:0.82rem;">I understand this is permanent and confirm deletion of my account.</label>
            </div>
            <button type="submit" class="btn btn-danger w-100"><i class="fas fa-trash"></i> Delete My Account</button>
        </form>
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary mt-3"><i class="fas fa-arrow-left"></i> Back</a>
    </div>
</div>
{% endblock %}
